name: Lab 3 - Continuous Deployment Notification

on: [push]

jobs:
  deploy-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Simulate Deployment
        run: |
          echo "🚀 Đang triển khai Module Automation lên Server..."
          sleep 5
          echo "✅ Triển khai hoàn tất!"

      - name: Send Telegram Notification
        # Bước này chỉ chạy nếu tất cả các bước trên thành công
        if: success()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendMessage \
            -d chat_id=$CHAT_ID \
            -d text="🔔 [CI/CD Alert]: Dự án Digital Transformation vừa cập nhật 
            thành công! 🚀"
